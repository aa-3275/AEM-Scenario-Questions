    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --border: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #6366f1;
      }

      body {
        font-family: system-ui;
        background: linear-gradient(180deg, #020617, #0f172a);
        color: var(--text);
        padding: 20px;
      }

      /* HEADER */
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      .header h1 {
        font-size: 28px;
        background: linear-gradient(90deg, #6366f1, #22c55e);
        -webkit-background-clip: text;
        color: transparent;
      }
      .header p {
        color: var(--muted);
      }

      /* FILTER */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
      }

      .pill {
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        cursor: pointer;
        font-size: 12px;
        background: #020617;
        color: var(--muted);
      }
      .pill.active {
        background: var(--accent);
        color: white;
      }

      /* GRID */
      .section-label {
        margin: 20px 0 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 15px;
      }

      /* CARD */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        transition: 0.2s;
      }
      .card:hover {
        transform: translateY(-5px);
      }

      .card-head {
        padding: 16px;
      }

      .meta {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }

      .badge {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 999px;
        background: #1f2937;
      }

      .qtext {
        font-size: 14px;
        line-height: 1.6;
      }

      /* ANSWER */
      .answer-toggle {
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        cursor: pointer;
        font-size: 13px;
        color: var(--muted);
      }

      .answer {
        display: none;
        padding: 15px;
        font-size: 13px;
      }

      .answer.open {
        display: block;
      }

      .hint {
        font-size: 12px;
        margin-bottom: 10px;
        color: var(--muted);
      }

      ul {
        padding-left: 18px;
      }
      li {
        margin-bottom: 6px;
      }
    </style>
  </head>
